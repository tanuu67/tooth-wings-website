<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tooth Wings Dental</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h2 class="logo">🦷 Tooth Wings</h2>
    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
    </nav>
</header>

<!-- HERO -->
<section class="hero">
    <div class="hero-text">
        <h1>Bright Smile Starts Here ✨</h1>
        <p>Advanced dental care with expert doctors</p>
        <button>Book Appointment</button>
    </div>

    <div class="hero-img">
        <img src="clinic1.jpg" alt="clinic">
    </div>
</section>

<!-- GALLERY -->
<section class="gallery">
    <h2>Our Clinic</h2>
    <div class="gallery-box">
        <img src="clinic1.jpg">
        <img src="clinic2.jpg">
        <img src="clinic3.jpg">
        <img src="clinic4.jpg">
    </div>
</section>

<!-- SERVICES -->
<section class="services">
    <h2>Our Services</h2>
    <div class="cards">
        <div class="card">Teeth Whitening</div>
        <div class="card">Root Canal</div>
        <div class="card">Dental Implants</div>
        <div class="card">Braces</div>
    </div>
</section>

<footer>
    <p>© 2026 Tooth Wings</p>
</footer>

</html>
