<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tooth Wings Dental</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<header>
    <div class="logo-box">
        <img src="logo.jpg">
        <h2>Tooth Wings</h2>
    </div>

    <nav>
        <a href="#">Home</a>
        <a href="#gallery">Gallery</a>
        <a href="#services">Services</a>
        <a href="#contact">Contact</a>
    </nav>
</header>

<!-- HERO -->
<section class="hero">
    <div class="hero-text">
        <h1>Beautiful Smile Starts Here ✨</h1>
        <p>Modern dental care with advanced technology</p>
        <button>Book Appointment</button>
    </div>

    <div class="hero-img">
        <img src="clinic1.jpg">
    </div>
</section>

<!-- GALLERY -->
<section class="gallery" id="gallery">
    <h2>Our Clinic</h2>
    <div class="gallery-box">
        <img src="clinic1.jpg">
        <img src="clinic2.jpg">
        <img src="clinic3.jpg">
        <img src="clinic4.jpg">
    </div>
</section>

<!-- SERVICES -->
<section class="services" id="services">
    <h2>Our Services</h2>
    <div class="cards">
        <div class="card">🦷 Teeth Whitening</div>
        <div class="card">🪥 Root Canal</div>
        <div class="card">😁 Implants</div>
        <div class="card">😬 Braces</div>
    </div>
</section>

<!-- CONTACT FORM -->
<section class="contact" id="contact">
    <h2>Book Appointment</h2>
    <form>
        <input type="text" placeholder="Your Name" required>
        <input type="tel" placeholder="Phone Number" required>
        <input type="date" required>
        <button type="submit">Submit</button>
    </form>
</section>

<!-- WHATSAPP BUTTON -->
<a href="https://wa.me/91XXXXXXXXXX" class="whatsapp" target="_blank">💬</a>

<!-- FOOTER -->
<footer>
    <p>© 2026 Tooth Wings Dental Clinic</p>
</footer>

</body>
</html>
