<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tooth Wings Dental</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',sans-serif}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
background:#fff;
position:sticky;
top:0;
}

/* LOGO */
.logo-box{
display:flex;
align-items:center;
gap:10px;
}

.logo-box img{
width:35px;
}

/* NAV */
nav a{
margin-left:20px;
text-decoration:none;
color:#333;
}

/* HERO */
.hero{
display:flex;
align-items:center;
justify-content:space-between;
padding:60px 30px;
flex-wrap:wrap;
}

.hero img{
width:300px;
border-radius:10px;
}

/* SERVICES */
.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:40px;
}

.card{
background:#f5f9ff;
padding:20px;
border-radius:10px;
}

/* GALLERY */
.gallery{
padding:40px;
text-align:center;
}

.gallery-box{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:10px;
}

.gallery-box img{
width:100%;
border-radius:10px;
}

/* CONTACT */
.contact{
padding:40px;
text-align:center;
}

input,button{
width:100%;
margin:10px 0;
padding:10px;
}

button{
background:#0b5ed7;
color:white;
border:none;
}

</style>
</head>

<body>

<!-- HEADER -->
<header>
<div class="logo-box">
<img src="logo.jpg">
<h2>Tooth Wings</h2>
</div>

<nav>
<a href="#">Home</a>
<a href="#services">Services</a>
<a href="#gallery">Gallery</a>
<a href="#contact">Contact</a>
</nav>
</header>

<!-- HERO -->
<section class="hero">
<div>
<h1>Your Smile, Our Priority</h1>
<p>Modern dental care</p>
</div>

<img src="clinic1.jpg">
</section>

<!-- SERVICES -->
<section id="services">
<div class="cards">
<div class="card">Dental Implants</div>
<div class="card">Root Canal</div>
<div class="card">Whitening</div>
<div class="card">Braces</div>
</div>
</section>

<!-- GALLERY (DOCTORS REMOVED) -->
<section class="gallery" id="gallery">
<h2>Our Gallery</h2>

<div class="gallery-box">
<img src="clinic1.jpg">
<img src="clinic2.jpg">
<img src="clinic3.jpg">
<img src="clinic4.jpg">
</div>

</section>

<!-- CONTACT -->
<section class="contact" id="contact">
<h2>Book Appointment</h2>

<input placeholder="Name">
<input placeholder="Phone">
<button>Submit</button>

</section>

</body>
</html>
